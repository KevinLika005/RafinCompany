name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: hostinger-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Upload site to Hostinger
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    environment:
      name: production
    env:
      HOSTINGER_FTP_HOST: ${{ secrets.HOSTINGER_FTP_HOST }}
      HOSTINGER_FTP_USERNAME: ${{ secrets.HOSTINGER_FTP_USERNAME }}
      HOSTINGER_FTP_PASSWORD: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
      HOSTINGER_FTP_PORT: ${{ secrets.HOSTINGER_FTP_PORT }}
      HOSTINGER_FTP_PROTOCOL: ${{ secrets.HOSTINGER_FTP_PROTOCOL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Validate deployment settings
        shell: bash
        run: |
          set -euo pipefail

          test -n "$HOSTINGER_FTP_HOST" || { echo "Missing secret: HOSTINGER_FTP_HOST"; exit 1; }
          test -n "$HOSTINGER_FTP_USERNAME" || { echo "Missing secret: HOSTINGER_FTP_USERNAME"; exit 1; }
          test -n "$HOSTINGER_FTP_PASSWORD" || { echo "Missing secret: HOSTINGER_FTP_PASSWORD"; exit 1; }

          case "$HOSTINGER_FTP_HOST" in
            ftp://*|ftps://*|http://*|https://*)
              echo "HOSTINGER_FTP_HOST must be only the FTP hostname or IP, without ftp:// or https://"
              exit 1
              ;;
          esac

      - name: Normalize FTP settings
        shell: bash
        run: |
          echo "DEPLOY_FTP_PORT=${HOSTINGER_FTP_PORT:-21}" >> "$GITHUB_ENV"
          echo "DEPLOY_FTP_SERVER_DIR=./" >> "$GITHUB_ENV"
          echo "DEPLOY_FTP_PROTOCOL=${HOSTINGER_FTP_PROTOCOL:-ftp}" >> "$GITHUB_ENV"

      - name: Install lftp
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy files with lftp
        shell: bash
        run: |
          set -euo pipefail

          if [ "$DEPLOY_FTP_PROTOCOL" = "ftps" ]; then
            SSL_FORCE=true
            SSL_ALLOW=true
            SSL_PROTECT=true
          else
            SSL_FORCE=false
            SSL_ALLOW=false
            SSL_PROTECT=false
          fi

          export HOSTINGER_FTP_USERNAME HOSTINGER_FTP_PASSWORD HOSTINGER_FTP_HOST DEPLOY_FTP_PORT DEPLOY_FTP_SERVER_DIR

          lftp <<EOF
          set cmd:fail-exit true
          set net:max-retries 2
          set net:timeout 20
          set xfer:clobber true
          set ftp:ssl-force ${SSL_FORCE}
          set ftp:ssl-allow ${SSL_ALLOW}
          set ftp:ssl-protect-data ${SSL_PROTECT}
          open -p "${DEPLOY_FTP_PORT}" "${HOSTINGER_FTP_HOST}"
          user "${HOSTINGER_FTP_USERNAME}" "${HOSTINGER_FTP_PASSWORD}"
          mirror -R --delete --verbose \
            --transfer-all \
            --overwrite \
            --exclude-glob .git* \
            --exclude-glob .github \
            --exclude-glob .tools \
            --exclude-glob .tmp-edge \
            --exclude-glob .vendor \
            --exclude-glob .vscode \
            --exclude-glob Thumbs.db \
            --exclude-glob '*.docx' \
            --exclude-glob '*.log' \
            --exclude-glob '*.md' \
            --exclude-glob .gitattributes \
            --exclude-glob .gitignore \
            ./ "${DEPLOY_FTP_SERVER_DIR}"
          bye
          EOF
