name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      confirm_live_deploy:
        description: "Type DEPLOY to confirm live deployment"
        required: true
        default: "NO"

concurrency:
  group: hostinger-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Upload site to Hostinger
    runs-on: ubuntu-latest
    timeout-minutes: 25

    permissions:
      contents: read

    env:
      HOSTINGER_FTP_HOST: ${{ secrets.HOSTINGER_FTP_HOST }}
      HOSTINGER_FTP_USERNAME: ${{ secrets.HOSTINGER_FTP_USERNAME }}
      HOSTINGER_FTP_PASSWORD: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
      HOSTINGER_FTP_PORT: ${{ secrets.HOSTINGER_FTP_PORT }}
      HOSTINGER_FTP_PROTOCOL: ${{ secrets.HOSTINGER_FTP_PROTOCOL }}
      LIVE_SITE_URL: https://www.rafincompany.com

    steps:
      - name: Confirm live deployment
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event.inputs.confirm_live_deploy }}" != "DEPLOY" ]; then
            echo "Live deployment cancelled. Type DEPLOY to continue."
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v5

      - name: Validate deployment settings
        shell: bash
        run: |
          set -euo pipefail

          test -n "$HOSTINGER_FTP_HOST" || { echo "Missing secret: HOSTINGER_FTP_HOST"; exit 1; }
          test -n "$HOSTINGER_FTP_USERNAME" || { echo "Missing secret: HOSTINGER_FTP_USERNAME"; exit 1; }
          test -n "$HOSTINGER_FTP_PASSWORD" || { echo "Missing secret: HOSTINGER_FTP_PASSWORD"; exit 1; }

          case "$HOSTINGER_FTP_HOST" in
            ftp://*|ftps://*|http://*|https://*)
              echo "HOSTINGER_FTP_HOST must be only the FTP hostname or IP, without ftp://, ftps://, http://, or https://"
              exit 1
              ;;
          esac

          echo "FTP host is set."
          echo "FTP port: ${HOSTINGER_FTP_PORT:-21}"
          echo "FTP protocol: ${HOSTINGER_FTP_PROTOCOL:-ftp}"
          echo "Remote deploy folder: FTP account root"

      - name: Validate required site files and referenced assets
        shell: bash
        run: |
          set -euo pipefail

          required_files=(
            "index.html"
            "career.html"
            "projects.html"
            "project.html"
            "services.html"
            "siguria.html"
            "css/style.css"
            "css/redesign.css"
            "js/script.js"
            "js/jobs-section.js"
            "data/jobs.js"
            "rafin-logo-white-transparent.png"
            "images/logo-white-cropped.png"
          )

          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Missing required file: $file"
              exit 1
            fi

            if [ ! -s "$file" ]; then
              echo "Required file is empty: $file"
              exit 1
            fi
          done

          mapfile -t referenced_assets < <(
            python -c "from pathlib import Path; import re; roots=('images/','fonts/','css/','js/','data/','rafin_transparent_logos_png/','rafin-logo'); patterns=(re.compile(r'''(?:src|href)\s*=\s*[\\\"\\']([^\\\"\\']+)[\\\"\\']''', re.IGNORECASE), re.compile(r'''url\\(\\s*[\\\"\\']?([^)\\\"\\']+)[\\\"\\']?\\s*\\)''', re.IGNORECASE)); is_local=lambda value: value and not value.lower().startswith(('http://','https://','//','mailto:','tel:','javascript:','#','data:')) and any(value.startswith(root) for root in roots); assets=set(); [assets.add(asset) for pattern in ('*.html','*.css','*.js') for path in Path('.').rglob(pattern) for regex in patterns for asset in [m.split('?',1)[0].split('#',1)[0].strip() for m in regex.findall(path.read_text(encoding='utf-8', errors='ignore'))] if is_local(asset)]; print('\\n'.join(sorted(assets)))"
          )

          missing_assets=0

          for asset in "${referenced_assets[@]}"; do
            if [ ! -e "$asset" ]; then
              echo "Missing referenced asset: $asset"
              missing_assets=1
              continue
            fi

            if [ -f "$asset" ] && [ ! -s "$asset" ]; then
              echo "Referenced asset is empty: $asset"
              missing_assets=1
            fi
          done

          if [ "$missing_assets" -ne 0 ]; then
            echo "Deployment blocked because referenced assets are missing or empty."
            exit 1
          fi

          echo "All required files and referenced local assets are present."

      - name: Prepare clean deploy folder
        shell: bash
        run: |
          set -euo pipefail

          rm -rf deploy
          mkdir deploy

          rsync -av ./ deploy/ \
            --exclude deploy/ \
            --exclude .git/ \
            --exclude .github/ \
            --exclude .vscode/ \
            --exclude .tools/ \
            --exclude .tmp-edge/ \
            --exclude .vendor/ \
            --exclude Thumbs.db \
            --exclude '*.docx' \
            --exclude '*.log' \
            --exclude '*.md' \
            --exclude '.gitattributes' \
            --exclude '.gitignore'

          test -f deploy/index.html
          test -f deploy/css/style.css
          test -f deploy/css/redesign.css
          test -f deploy/js/script.js

          echo "commit=${GITHUB_SHA}" > deploy/deploy-marker.txt
          echo "deployed_at_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> deploy/deploy-marker.txt
          echo "branch=${GITHUB_REF_NAME}" >> deploy/deploy-marker.txt

          echo "Prepared deploy folder:"
          find deploy -maxdepth 2 -type f | sort | head -80

      - name: Install deployment tools
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp curl

      - name: Upload files to Hostinger
        shell: bash
        run: |
          set -euo pipefail

          DEPLOY_FTP_PORT="${HOSTINGER_FTP_PORT:-21}"
          DEPLOY_FTP_PROTOCOL="${HOSTINGER_FTP_PROTOCOL:-ftp}"
          if [ "$DEPLOY_FTP_PROTOCOL" = "ftps" ]; then
            SSL_FORCE=true
            SSL_ALLOW=true
            SSL_PROTECT=true
          else
            SSL_FORCE=false
            SSL_ALLOW=false
            SSL_PROTECT=false
          fi

          lftp <<EOF
          set cmd:fail-exit true
          set net:max-retries 5
          set net:timeout 30
          set net:reconnect-interval-base 10
          set xfer:clobber true
          set ftp:passive-mode true
          set ftp:ssl-force ${SSL_FORCE}
          set ftp:ssl-allow ${SSL_ALLOW}
          set ftp:ssl-protect-data ${SSL_PROTECT}

          open -p "${DEPLOY_FTP_PORT}" "${HOSTINGER_FTP_HOST}"
          user "${HOSTINGER_FTP_USERNAME}" "${HOSTINGER_FTP_PASSWORD}"

          echo "Remote starting folder:"
          pwd
          cls -la

          mirror -R --verbose --transfer-all --overwrite deploy/ .

          echo "Remote folder after upload:"
          cls -la
          cls -l index.html
          cls -l deploy-marker.txt

          bye
          EOF

      - name: Verify deployment on live website
        shell: bash
        run: |
          set -euo pipefail

          primary_url="${LIVE_SITE_URL%/}"
          alternate_url="$primary_url"

          if [[ "$primary_url" == https://www.* ]]; then
            alternate_url="https://${primary_url#https://www.}"
          elif [[ "$primary_url" == http://www.* ]]; then
            alternate_url="http://${primary_url#http://www.}"
          elif [[ "$primary_url" == https://* ]]; then
            alternate_url="https://www.${primary_url#https://}"
          elif [[ "$primary_url" == http://* ]]; then
            alternate_url="http://www.${primary_url#http://}"
          fi

          urls=("$primary_url")
          if [[ "$alternate_url" != "$primary_url" ]]; then
            urls+=("$alternate_url")
          fi

          marker_verified=0

          for base_url in "${urls[@]}"; do
            marker_url="${base_url}/deploy-marker.txt?cb=${GITHUB_SHA}"
            echo "Checking live deployment marker at: $marker_url"

            for attempt in 1 2 3 4 5; do
              if curl -fsSL "$marker_url" -o live-deploy-marker.txt; then
                if grep -q "$GITHUB_SHA" live-deploy-marker.txt; then
                  echo "Live website is serving the deployed commit from: $base_url"
                  marker_verified=1
                  break 2
                fi
              fi

              echo "Marker not available yet at ${base_url}, retry ${attempt}/5"
              sleep 5
            done
          done

          if [[ "$marker_verified" -ne 1 ]]; then
            echo "Warning: deploy-marker.txt could not be verified on the public URL. Continuing to homepage verification."
          fi

      - name: Verify homepage is reachable
        shell: bash
        run: |
          set -euo pipefail

          primary_url="${LIVE_SITE_URL%/}"
          alternate_url="$primary_url"

          if [[ "$primary_url" == https://www.* ]]; then
            alternate_url="https://${primary_url#https://www.}"
          elif [[ "$primary_url" == http://www.* ]]; then
            alternate_url="http://${primary_url#http://www.}"
          elif [[ "$primary_url" == https://* ]]; then
            alternate_url="https://www.${primary_url#https://}"
          elif [[ "$primary_url" == http://* ]]; then
            alternate_url="http://www.${primary_url#http://}"
          fi

          urls=("$primary_url")
          if [[ "$alternate_url" != "$primary_url" ]]; then
            urls+=("$alternate_url")
          fi

          for base_url in "${urls[@]}"; do
            if curl -fsSL "${base_url}/?cb=${GITHUB_SHA}" -o live-index.html; then
              if grep -q "Rafin Company" live-index.html; then
                echo "Homepage is reachable at ${base_url} and contains Rafin Company."
                exit 0
              fi
            fi
          done

          echo "Homepage verification failed on both primary and alternate URLs."
          exit 1
